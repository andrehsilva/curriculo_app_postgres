<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Triagem de Currículos</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { jakarta: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        accent: { DEFAULT: '#B85C72', light: '#F7EDF0', dark: '#8F3F55' },
                        page: '#F4F2EF',
                        card: '#FFFFFF',
                        border: '#EBEBEB',
                        ink: '#1A1A1A',
                        muted: '#7A7A7A',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        * {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>

<body class="bg-page text-ink antialiased flex h-screen items-center justify-center p-4">

    <div class="bg-card w-full max-w-sm p-8 rounded-[14px] border border-border shadow-xl">
        <div class="text-center mb-6">
            <span class="text-3xl block mb-2">🎒</span>
            <h1 class="text-xl font-extrabold text-ink leading-tight">Escola Pique Aprende</h1>
            <p class="text-xs text-muted mt-1">Painel de Triagem de Currículos</p>
        </div>

        <form method="POST" action="/login" class="space-y-4">
            <div>
                <label for="senha" class="block text-[10px] font-bold text-muted uppercase tracking-wider mb-1">
                    Senha de Acesso
                </label>
                <input type="password" id="senha" name="senha" placeholder="Digite a senha do sistema..." required
                    autofocus
                    class="w-full text-sm bg-page border border-border rounded-[10px] px-3.5 py-2.5 focus:outline-none focus:border-accent transition-colors" />

                {% if erro %}
                <p class="text-xs text-red-500 mt-2 font-semibold flex items-center gap-1">
                    <span>⚠️</span> {{ erro }}
                </p>
                {% endif %}
            </div>

            <button type="submit"
                class="w-full py-2.5 rounded-[10px] bg-accent hover:bg-accent-dark text-white text-sm font-bold transition-colors shadow-sm mt-2">
                Entrar no Sistema
            </button>
        </form>
    </div>

</body>

</html>
